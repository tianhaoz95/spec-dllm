# Experiment 3: BD-EAGLE with DFlash-style anchor masking + position weighting

run_name: bd_eagle_anchor

target_model: Qwen/Qwen3-8B
eagle_model: AngelSlim/Qwen3-8B_eagle3
dflash_model: z-lab/Qwen3-8B-DFlash-b16
bd_eagle_checkpoint: checkpoints/bd_eagle_anchor/step_011500

target_layer_indices: [2, 18, 33]
feature_cache_dir: data/feature_cache_qwen3_8b

max_samples: 30000
max_length: 512

warmup_sizes: [1, 2, 4, 8]
stable_size: 8
decay_sizes: [4, 2]
steps_per_warmup_size: 500
stable_steps: 8000
steps_per_decay_size: 500

lr_max: 3.0e-4
lr_min: 3.0e-5

batch_size: 8
num_workers: 4
grad_clip: 0.5

# Anchor masking enabled
use_anchor_masking: true
n_anchors_per_block: 2       # 2 anchor tokens per block of 8
use_position_weight: true
loss_gamma: 4.0              # slightly lower gamma for smaller block size

log_every: 50
save_every: 500
output_dir: checkpoints/bd_eagle_anchor

inference_block_size: 8
